function calcEMA(data, period) {
if(data.length < period) return [];
var k = 2/(period+1), emas = [];
var sum = data.slice(0,period).reduce(function(a,b){return a+b.close;},0);
emas.push({i:period-1, v:sum/period});
for(var i=period;i<data.length;i++){
emas.push({i:i, v:data[i].close*k + emas[emas.length-1].v*(1-k)});
}
return emas;
}

function calcVWAP(data) {
var cumTPV=0, cumVol=0;
return data.map(function(c){
var tp=(c.high+c.low+c.close)/3;
cumTPV+=tp*(c.volume||1);
cumVol+=(c.volume||1);
return cumTPV/cumVol;
});
}

function detectFVGs(data) {
var fvgs=[];
for(var i=2;i<data.length;i++){
var prev=data[i-2], mid=data[i-1], curr=data[i];
// Bullish FVG: gap between prev high and curr low
if(curr.low > prev.high){
fvgs.push({type:“bull”, top:curr.low, bot:prev.high, idx:i, filled:false});
}
// Bearish FVG: gap between prev low and curr high
if(curr.high < prev.low){
fvgs.push({type:“bear”, top:prev.low, bot:curr.high, idx:i, filled:false});
}
}
// Mark filled
fvgs.forEach(function(fvg){
for(var j=fvg.idx+1;j<data.length;j++){
if(fvg.type===“bull” && data[j].low<=fvg.top) { fvg.filled=true; break; }
if(fvg.type===“bear” && data[j].high>=fvg.bot) { fvg.filled=true; break; }
}
});
return fvgs.slice(-20); // last 20 FVGs only
}

var chunk=bars.slice(i,i+agg);

aggBars.push({

high:Math.max.apply(null,chunk.map(function(b){return b.high;})),

});

}
setLoading(false);
}
